name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=modules --cov-report=term-missing --cov-fail-under=60
        env:
          DATABASE_URL: ""
          OPENROUTER_API_KEY: "fake-key-ci"
